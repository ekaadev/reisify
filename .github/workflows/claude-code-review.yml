name: Claude Code Review

on:
  issue_comment:
    types: [created]

jobs:
  claude-review-delta:
    if: |
      github.event.issue.pull_request &&
      github.event.comment.body == '/review'

    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Review Delta
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/tirth8205/code-review-graph'
          plugins: 'code-review-graph@code-review-graph'
          prompt: '/code-review-graph:review-delta'

  claude-review-pr:
    if: |
      github.event.issue.pull_request &&
      github.event.comment.body == '/review-full'

    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Review PR
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/tirth8205/code-review-graph'
          plugins: 'code-review-graph@code-review-graph'
          prompt: '/code-review-graph:review-pr ${{ github.repository }}/pull/${{ github.event.issue.number }}'
